		<style>
			:root {
				--bg: #0b0b0c;
				--bg-2: #131316;
				--fg: #f3f1ec;
				--fg-dim: #8b8a85;
				--fg-dimmer: #5a5955;
				--line: rgba(255, 255, 255, 0.08);
				--line-strong: rgba(255, 255, 255, 0.18);
				--accent: oklch(0.82 0.17 132); /* lime */
				--accent-ink: #0b0b0c;

				--f-serif:
					"Instrument Serif", "Cormorant Garamond", Georgia, serif;
				--f-sans:
					"Geist", ui-sans-serif, -apple-system, "Helvetica Neue",
					sans-serif;
				--f-mono:
					"JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo,
					monospace;

				--pad: clamp(20px, 4vw, 56px);
				--max: 1240px;
			}

			/* Light variant — applied via [data-theme="light"] */
			html[data-theme="light"] {
				--bg: #f3f1ec;
				--bg-2: #ebe8e1;
				--fg: #1a1a1c;
				--fg-dim: #6e6c66;
				--fg-dimmer: #a09e96;
				--line: rgba(0, 0, 0, 0.1);
				--line-strong: rgba(0, 0, 0, 0.22);
				--accent: oklch(0.62 0.17 142);
				--accent-ink: #fafaf7;
			}

			*,
			*::before,
			*::after {
				box-sizing: border-box;
			}
			html,
			body {
				margin: 0;
				padding: 0;
				background: var(--bg);
				color: var(--fg);
				font-family: var(--f-sans);
				font-weight: 400;
				-webkit-font-smoothing: antialiased;
				text-rendering: optimizeLegibility;
				transition:
					background 0.35s ease,
					color 0.35s ease;
			}
			body {
				overflow-x: hidden;
			}
			a {
				color: inherit;
				text-decoration: none;
			}
			button {
				font: inherit;
				color: inherit;
				background: none;
				border: 0;
				cursor: pointer;
			}
			::selection {
				background: var(--accent);
				color: var(--accent-ink);
			}

			/* ─── shared shells ─── */
			.wrap {
				max-width: var(--max);
				margin: 0 auto;
				padding-left: var(--pad);
				padding-right: var(--pad);
			}
			.mono {
				font-family: var(--f-mono);
				font-size: 11px;
				letter-spacing: 0.06em;
				text-transform: uppercase;
			}
			.serif {
				font-family: var(--f-serif);
				font-weight: 400;
				letter-spacing: -0.01em;
			}
			.ital {
				font-style: italic;
			}
			.dim {
				color: var(--fg-dim);
			}
			.dimmer {
				color: var(--fg-dimmer);
			}
			.acc {
				color: var(--accent);
			}
			.hairline {
				height: 1px;
				background: var(--line);
				border: 0;
				margin: 0;
			}

			/* ─── nav ─── */
			.nav {
				position: sticky;
				top: 0;
				z-index: 50;
				backdrop-filter: blur(16px) saturate(140%);
				-webkit-backdrop-filter: blur(16px) saturate(140%);
				background: color-mix(in oklab, var(--bg) 75%, transparent);
				border-bottom: 1px solid var(--line);
			}
			.nav-in {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 14px var(--pad);
				max-width: none;
			}
			.brand {
				display: flex;
				align-items: center;
				gap: 10px;
				font-family: var(--f-mono);
				font-size: 12px;
				letter-spacing: 0.04em;
			}
			.brand .dot {
				width: 7px;
				height: 7px;
				border-radius: 50%;
				background: var(--accent);
				box-shadow: 0 0 0 0 var(--accent);
				animation: pulse 2.4s infinite ease-out;
			}
			@keyframes pulse {
				0% {
					box-shadow: 0 0 0 0
						color-mix(in oklab, var(--accent) 70%, transparent);
				}
				70% {
					box-shadow: 0 0 0 10px transparent;
				}
				100% {
					box-shadow: 0 0 0 0 transparent;
				}
			}
			.nav-links {
				display: flex;
				align-items: center;
				gap: 22px;
			}
			.nav-links a {
				font-family: var(--f-mono);
				font-size: 11px;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				color: var(--fg-dim);
				transition: color 0.2s;
			}
			.nav-links a:hover {
				color: var(--fg);
			}
			.nav-links a .num {
				color: var(--fg-dimmer);
				margin-right: 6px;
			}
			.theme-btn {
				width: 34px;
				height: 34px;
				border-radius: 50%;
				border: 1px solid var(--line-strong);
				display: inline-flex;
				align-items: center;
				justify-content: center;
				transition:
					transform 0.35s ease,
					background 0.25s;
			}
			.theme-btn:hover {
				background: color-mix(in oklab, var(--fg) 8%, transparent);
			}
			.theme-btn svg {
				width: 14px;
				height: 14px;
			}

			@media (max-width: 760px) {
				.nav-links a:not(:first-child):not(:last-child) {
					display: none;
				}
			}

			/* ─── hero ─── */
			.hero {
				position: relative;
				padding: clamp(60px, 12vh, 140px) 0 clamp(60px, 10vh, 100px);
			}
			.hero-grid {
				display: grid;
				grid-template-columns: 1fr;
				gap: clamp(32px, 6vw, 64px);
			}
			.hero-meta {
				display: flex;
				justify-content: space-between;
				align-items: flex-end;
				color: var(--fg-dim);
				font-family: var(--f-mono);
				font-size: 11px;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				margin-bottom: clamp(24px, 5vh, 56px);
			}
			.hero-meta .right {
				text-align: right;
			}
			.status {
				display: inline-flex;
				align-items: center;
				gap: 8px;
			}
			.status .dot {
				width: 6px;
				height: 6px;
				border-radius: 50%;
				background: var(--accent);
				animation: pulse 2.4s infinite;
			}

			.hero h1 {
				font-family: var(--f-serif);
				font-weight: 400;
				font-size: clamp(54px, 11.5vw, 168px);
				line-height: 0.92;
				letter-spacing: -0.02em;
				margin: 0;
			}
			.hero h1 .l2 {
				display: block;
				padding-left: clamp(20px, 8vw, 120px);
			}
			.hero h1 .amp {
				color: var(--fg-dim);
				font-style: italic;
				font-weight: 400;
			}

			.hero-row {
				display: grid;
				grid-template-columns: 1.2fr 0.8fr;
				gap: clamp(24px, 6vw, 80px);
				align-items: end;
				margin-top: clamp(28px, 5vh, 56px);
				border-top: 1px solid var(--line);
				padding-top: clamp(24px, 5vh, 48px);
			}
			.hero-row p {
				font-size: clamp(15px, 1.4vw, 18px);
				line-height: 1.55;
				max-width: 46ch;
				margin: 0;
				color: var(--fg);
			}
			.hero-row p .acc-text {
				color: var(--accent);
			}
			.hero-row .colA {
				color: var(--fg-dim);
			}
			.hero-cta {
				display: flex;
				flex-direction: column;
				gap: 14px;
				align-items: flex-start;
			}
			.hero-cta .row {
				display: flex;
				gap: 10px;
				flex-wrap: wrap;
			}
			.btn {
				display: inline-flex;
				align-items: center;
				gap: 8px;
				padding: 11px 18px;
				border-radius: 999px;
				font-family: var(--f-mono);
				font-size: 11px;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				border: 1px solid var(--line-strong);
				transition: all 0.25s;
			}
			.btn:hover {
				background: color-mix(in oklab, var(--fg) 8%, transparent);
				transform: translateY(-1px);
			}
			.btn.primary {
				background: var(--accent);
				color: var(--accent-ink);
				border-color: var(--accent);
			}
			.btn.primary:hover {
				filter: brightness(1.05);
			}
			.btn .arrow {
				display: inline-block;
				transition: transform 0.25s;
			}
			.btn:hover .arrow {
				transform: translate(3px, -3px);
			}

			@media (max-width: 760px) {
				.hero-row {
					grid-template-columns: 1fr;
				}
			}

			/* marquee */
			.marquee {
				overflow: hidden;
				border-top: 1px solid var(--line);
				border-bottom: 1px solid var(--line);
				padding: 18px 0;
				margin-top: clamp(40px, 8vh, 80px);
				-webkit-mask-image: linear-gradient(
					90deg,
					transparent,
					#000 8%,
					#000 92%,
					transparent
				);
				mask-image: linear-gradient(
					90deg,
					transparent,
					#000 8%,
					#000 92%,
					transparent
				);
			}
			.marquee-track {
				display: flex;
				gap: 48px;
				white-space: nowrap;
				animation: scroll 36s linear infinite;
				width: max-content;
			}
			.marquee span {
				font-family: var(--f-serif);
				font-size: clamp(28px, 4vw, 48px);
				font-style: italic;
				color: var(--fg-dim);
				display: inline-flex;
				align-items: center;
				gap: 48px;
			}
			.marquee span::after {
				content: "✦";
				font-size: 0.5em;
				color: var(--accent);
				margin-left: 48px;
				vertical-align: middle;
			}
			@keyframes scroll {
				from {
					transform: translateX(0);
				}
				to {
					transform: translateX(-50%);
				}
			}

			/* ─── section heads ─── */
			section {
				padding: clamp(80px, 12vh, 140px) 0;
				border-top: 1px solid var(--line);
			}
			.sec-head {
				display: grid;
				grid-template-columns: minmax(0, 220px) 1fr;
				gap: clamp(24px, 6vw, 64px);
				margin-bottom: clamp(40px, 8vh, 72px);
				align-items: start;
			}
			.sec-head .label {
				font-family: var(--f-mono);
				font-size: 11px;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: var(--fg-dim);
				display: flex;
				flex-direction: column;
				gap: 8px;
				position: sticky;
				top: 80px;
			}
			.sec-head .label .num {
				color: var(--accent);
			}
			.sec-head h2 {
				font-family: var(--f-serif);
				font-weight: 400;
				font-size: clamp(36px, 5.4vw, 72px);
				line-height: 1.02;
				letter-spacing: -0.02em;
				margin: 0;
				max-width: 14ch;
			}
			.sec-head h2 em {
				color: var(--fg-dim);
				font-style: italic;
			}
			@media (max-width: 760px) {
				.sec-head {
					grid-template-columns: 1fr;
					gap: 18px;
				}
				.sec-head .label {
					position: static;
				}
			}

			/* ─── about ─── */
			.about-grid {
				display: grid;
				grid-template-columns: minmax(0, 220px) 1fr;
				gap: clamp(24px, 6vw, 64px);
			}
			.about-grid .spacer {
			}
			.about-text {
				max-width: 56ch;
				font-size: clamp(17px, 1.6vw, 22px);
				line-height: 1.55;
				color: var(--fg);
			}
			.about-text p + p {
				margin-top: 1.2em;
			}
			.about-text .hi {
				color: var(--accent);
			}
			.about-text em {
				color: var(--fg-dim);
				font-style: italic;
				font-family: var(--f-serif);
			}

			.now-card {
				margin-top: clamp(40px, 6vh, 64px);
				border: 1px solid var(--line);
				border-radius: 18px;
				padding: clamp(20px, 3vw, 32px);
				background: linear-gradient(
					180deg,
					color-mix(in oklab, var(--bg-2) 80%, transparent),
					transparent
				);
				display: grid;
				grid-template-columns: 1fr 1fr 1fr;
				gap: clamp(16px, 2.5vw, 32px);
			}
			.now-card .cell {
				display: flex;
				flex-direction: column;
				gap: 8px;
			}
			.now-card .cell .k {
				font-family: var(--f-mono);
				font-size: 10.5px;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: var(--fg-dim);
			}
			.now-card .cell .v {
				font-family: var(--f-serif);
				font-size: clamp(20px, 1.8vw, 26px);
				line-height: 1.2;
			}
			@media (max-width: 760px) {
				.now-card {
					grid-template-columns: 1fr;
				}
			}

			/* ─── experience timeline ─── */
			.xp-list {
				display: flex;
				flex-direction: column;
			}
			.xp {
				display: grid;
				grid-template-columns: 140px 1fr auto;
				gap: clamp(16px, 3vw, 48px);
				align-items: start;
				padding: clamp(20px, 3vw, 32px) 0;
				border-top: 1px solid var(--line);
				position: relative;
				transition: padding-left 0.35s ease;
			}
			.xp:last-child {
				border-bottom: 1px solid var(--line);
			}
			.xp::before {
				content: "";
				position: absolute;
				left: -12px;
				top: 50%;
				width: 6px;
				height: 6px;
				border-radius: 50%;
				background: var(--accent);
				transform: translateY(-50%) scale(0);
				transition: transform 0.35s ease;
			}
			.xp:hover {
				padding-left: 14px;
			}
			.xp:hover::before {
				transform: translateY(-50%) scale(1);
			}
			.xp:hover .xp-role {
				color: var(--accent);
			}
			.xp-when {
				font-family: var(--f-mono);
				font-size: 11px;
				letter-spacing: 0.06em;
				color: var(--fg-dim);
				padding-top: 6px;
			}
			.xp-body {
				display: flex;
				flex-direction: column;
				gap: 10px;
			}
			.xp-role {
				font-family: var(--f-serif);
				font-size: clamp(24px, 2.6vw, 34px);
				line-height: 1.1;
				transition: color 0.25s;
			}
			.xp-role .at {
				color: var(--fg-dim);
				font-style: italic;
			}
			.xp-desc {
				color: var(--fg-dim);
				max-width: 64ch;
				font-size: 14.5px;
				line-height: 1.55;
			}
			.xp-tags {
				display: flex;
				flex-wrap: wrap;
				gap: 6px;
				margin-top: 4px;
			}
			.xp-tag {
				font-family: var(--f-mono);
				font-size: 10px;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				color: var(--fg-dim);
				padding: 4px 9px;
				border: 1px solid var(--line);
				border-radius: 999px;
			}
			.xp-place {
				font-family: var(--f-mono);
				font-size: 11px;
				letter-spacing: 0.06em;
				color: var(--fg-dim);
				padding-top: 6px;
				text-align: right;
			}
			@media (max-width: 760px) {
				.xp {
					grid-template-columns: 1fr;
				}
				.xp-place {
					text-align: left;
				}
			}

			/* ─── projects ─── */
			.pj-grid {
				display: grid;
				grid-template-columns: repeat(12, 1fr);
				gap: clamp(16px, 2vw, 24px);
			}
			.pj {
				position: relative;
				border: 1px solid var(--line);
				border-radius: 16px;
				overflow: hidden;
				background: var(--bg-2);
				display: flex;
				flex-direction: column;
				transition:
					transform 0.35s ease,
					border-color 0.35s ease;
			}
			.pj:hover {
				border-color: var(--line-strong);
				transform: translateY(-4px);
			}
			.pj.size-lg {
				grid-column: span 7;
			}
			.pj.size-md {
				grid-column: span 5;
			}
			.pj.size-sm {
				grid-column: span 4;
			}
			@media (max-width: 980px) {
				.pj.size-lg,
				.pj.size-md,
				.pj.size-sm {
					grid-column: span 12;
				}
			}
			.pj-cover {
				aspect-ratio: 16/10;
				position: relative;
				overflow: hidden;
				background:
					radial-gradient(
						900px 400px at 100% 0%,
						color-mix(in oklab, var(--accent) 18%, transparent),
						transparent 60%
					),
					linear-gradient(
						135deg,
						color-mix(in oklab, var(--bg-2) 70%, #000) 0%,
						var(--bg-2) 100%
					);
				border-bottom: 1px solid var(--line);
			}
			.pj-cover .lines {
				position: absolute;
				inset: 0;
				background-image:
					repeating-linear-gradient(
						0deg,
						transparent 0 23px,
						var(--line) 23px 24px
					),
					repeating-linear-gradient(
						90deg,
						transparent 0 23px,
						var(--line) 23px 24px
					);
				opacity: 0.4;
			}
			.pj-cover .badge {
				position: absolute;
				top: 14px;
				left: 14px;
				font-family: var(--f-mono);
				font-size: 10px;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				padding: 5px 10px;
				border-radius: 999px;
				border: 1px solid var(--line-strong);
				background: color-mix(in oklab, var(--bg) 65%, transparent);
				backdrop-filter: blur(6px);
				-webkit-backdrop-filter: blur(6px);
				color: var(--fg);
			}
			.pj-cover .year {
				position: absolute;
				bottom: 14px;
				right: 16px;
				font-family: var(--f-mono);
				font-size: 10.5px;
				color: var(--fg-dim);
			}
			.pj-cover .glyph {
				position: absolute;
				inset: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				font-family: var(--f-serif);
				font-style: italic;
				font-size: clamp(80px, 12vw, 180px);
				color: color-mix(in oklab, var(--fg) 12%, transparent);
				pointer-events: none;
				user-select: none;
			}
			.pj.size-lg .pj-cover .glyph {
				font-size: clamp(100px, 15vw, 240px);
			}
			.pj-body {
				padding: clamp(18px, 2.2vw, 28px);
				display: flex;
				flex-direction: column;
				gap: 14px;
			}
			.pj-title {
				font-family: var(--f-serif);
				font-size: clamp(22px, 2vw, 30px);
				line-height: 1.15;
				letter-spacing: -0.01em;
			}
			.pj-title .arrow {
				color: var(--fg-dim);
				font-style: italic;
				margin-left: 8px;
				transition:
					transform 0.25s,
					color 0.25s;
				display: inline-block;
			}
			.pj:hover .pj-title .arrow {
				color: var(--accent);
				transform: translate(4px, -4px);
			}
			.pj-desc {
				color: var(--fg-dim);
				font-size: 14.5px;
				line-height: 1.5;
				max-width: 48ch;
			}
			.pj-stack {
				display: flex;
				flex-wrap: wrap;
				gap: 6px;
				margin-top: auto;
			}
			.pj-chip {
				font-family: var(--f-mono);
				font-size: 10px;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				color: var(--fg-dim);
				padding: 4px 9px;
				border: 1px solid var(--line);
				border-radius: 6px;
			}
			.pj-meta {
				display: flex;
				justify-content: space-between;
				align-items: center;
				border-top: 1px solid var(--line);
				padding-top: 14px;
				margin-top: 4px;
				font-family: var(--f-mono);
				font-size: 10.5px;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				color: var(--fg-dim);
			}
			.pj-meta a:hover {
				color: var(--accent);
			}

			/* ─── freelance ─── */
			.fl-grid {
				display: grid;
				grid-template-columns: repeat(2, 1fr);
				gap: clamp(16px, 2vw, 24px);
			}
			@media (max-width: 760px) {
				.fl-grid {
					grid-template-columns: 1fr;
				}
			}
			.fl {
				border: 1px solid var(--line);
				border-radius: 14px;
				padding: clamp(20px, 2.5vw, 28px);
				display: flex;
				flex-direction: column;
				gap: 14px;
				min-height: 200px;
				transition:
					border-color 0.25s,
					background 0.25s;
				background: linear-gradient(
					180deg,
					color-mix(in oklab, var(--bg-2) 35%, transparent),
					transparent
				);
			}
			.fl:hover {
				border-color: var(--line-strong);
			}
			.fl-top {
				display: flex;
				justify-content: space-between;
				align-items: center;
				color: var(--fg-dim);
				font-family: var(--f-mono);
				font-size: 10.5px;
				letter-spacing: 0.07em;
				text-transform: uppercase;
			}
			.fl-top .status {
				color: var(--accent);
			}
			.fl-title {
				font-family: var(--f-serif);
				font-size: clamp(24px, 2.2vw, 30px);
				line-height: 1.15;
			}
			.fl-title em {
				color: var(--fg-dim);
				font-style: italic;
			}
			.fl-desc {
				color: var(--fg-dim);
				font-size: 14.5px;
				line-height: 1.55;
				flex: 1;
			}
			.fl-bottom {
				display: flex;
				gap: 10px;
				flex-wrap: wrap;
			}

			/* ─── skills cluster ─── */
			.sk-grid {
				display: grid;
				grid-template-columns: repeat(3, 1fr);
				gap: clamp(20px, 3vw, 40px);
			}
			@media (max-width: 760px) {
				.sk-grid {
					grid-template-columns: 1fr;
				}
			}
			.sk-col h4 {
				font-family: var(--f-mono);
				font-size: 11px;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: var(--fg-dim);
				font-weight: 500;
				margin: 0 0 18px;
				display: flex;
				align-items: center;
				gap: 10px;
			}
			.sk-col h4::before {
				content: "";
				width: 6px;
				height: 6px;
				background: var(--accent);
				border-radius: 50%;
			}
			.sk-list {
				display: flex;
				flex-direction: column;
				gap: 14px;
			}
			.sk-item {
				display: flex;
				justify-content: space-between;
				align-items: baseline;
				gap: 12px;
				border-bottom: 1px dashed var(--line);
				padding-bottom: 10px;
			}
			.sk-item .name {
				font-family: var(--f-serif);
				font-size: 20px;
				line-height: 1.2;
			}
			.sk-item .lvl {
				font-family: var(--f-mono);
				font-size: 10px;
				letter-spacing: 0.07em;
				text-transform: uppercase;
				color: var(--fg-dimmer);
			}

			/* ─── contact ─── */
			.contact-pre {
				font-family: var(--f-mono);
				font-size: 11px;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: var(--fg-dim);
				margin-bottom: 24px;
			}
			.contact-big {
				font-family: var(--f-serif);
				font-weight: 400;
				font-size: clamp(40px, 7vw, 96px);
				line-height: 1;
				letter-spacing: -0.02em;
				margin: 0;
			}
			.contact-big em {
				color: var(--fg-dim);
				font-style: italic;
			}
			.contact-big a {
				color: var(--accent);
				position: relative;
				display: inline-block;
				transition: color 0.25s;
			}
			.contact-big a::after {
				content: "";
				position: absolute;
				left: 0;
				right: 0;
				bottom: 0.08em;
				height: 2px;
				background: var(--accent);
				transform-origin: left;
				transform: scaleX(1);
				transition: transform 0.35s;
			}
			.contact-big a:hover::after {
				transform: scaleX(0);
				transform-origin: right;
			}

			.contact-links {
				margin-top: clamp(40px, 6vh, 64px);
				display: grid;
				grid-template-columns: repeat(4, 1fr);
				gap: 0;
				border-top: 1px solid var(--line);
				border-bottom: 1px solid var(--line);
			}
			.contact-links a {
				padding: clamp(20px, 2.5vw, 28px);
				display: flex;
				flex-direction: column;
				gap: 8px;
				border-left: 1px solid var(--line);
				transition: background 0.25s;
			}
			.contact-links a:first-child {
				border-left: 0;
			}
			.contact-links a:hover {
				background: color-mix(in oklab, var(--fg) 5%, transparent);
			}
			.contact-links a .k {
				font-family: var(--f-mono);
				font-size: 10.5px;
				letter-spacing: 0.07em;
				text-transform: uppercase;
				color: var(--fg-dim);
			}
			.contact-links a .v {
				font-family: var(--f-serif);
				font-size: clamp(18px, 1.6vw, 22px);
				line-height: 1.2;
			}
			.contact-links a:hover .v {
				color: var(--accent);
			}
			@media (max-width: 760px) {
				.contact-links {
					grid-template-columns: repeat(2, 1fr);
				}
				.contact-links a:nth-child(3) {
					border-left: 0;
					border-top: 1px solid var(--line);
				}
				.contact-links a:nth-child(4) {
					border-top: 1px solid var(--line);
				}
			}

			/* ─── footer ─── */
			footer {
				padding: 36px 0 48px;
				border-top: 1px solid var(--line);
				display: flex;
				flex-wrap: wrap;
				gap: 18px;
				justify-content: space-between;
				align-items: center;
				color: var(--fg-dim);
				font-family: var(--f-mono);
				font-size: 11px;
				letter-spacing: 0.06em;
				text-transform: uppercase;
			}
			footer .lt {
				display: flex;
				gap: 24px;
				align-items: center;
			}
			footer .clock {
				color: var(--accent);
			}

			/* ─── tweaks: variations toggled by data-attr on body ─── */
			body[data-density="compact"] {
				--pad: clamp(16px, 3vw, 36px);
			}
			body[data-density="comfy"] {
				--pad: clamp(28px, 5vw, 72px);
			}

			body[data-font="editorial"] {
				--f-serif: "Instrument Serif", Georgia, serif;
				--f-sans: "Geist", ui-sans-serif, sans-serif;
			}
			body[data-font="classic"] {
				--f-serif: "Cormorant Garamond", Georgia, serif;
				--f-sans: "Geist", ui-sans-serif, sans-serif;
			}
			body[data-font="mono"] {
				--f-serif: "Fragment Mono", "JetBrains Mono", monospace;
				--f-sans: "JetBrains Mono", monospace;
			}

			/* tech logos */
			.tech-ico {
				width: 11px;
				height: 11px;
				object-fit: contain;
				vertical-align: -1px;
				margin-right: 6px;
				opacity: 0.95;
			}
			/* a couple of logos are pure black — flip them white on dark theme */
			html[data-theme="dark"] .tech-ico[data-name="next.js"],
			html[data-theme="dark"] .tech-ico[data-name="express"],
			html[data-theme="dark"] .tech-ico[data-name="vercel"],
			html[data-theme="dark"] .tech-ico[data-name="astro"],
			html[data-theme="dark"] .tech-ico[data-name="github"] {
				filter: invert(1);
			}
			.pj-chip,
			.xp-tag {
				display: inline-flex;
				align-items: center;
			}
			.marquee span .tech-ico {
				width: 0.7em;
				height: 0.7em;
				margin-right: 0.5em;
				vertical-align: 0;
				opacity: 0.85;
			}
			.sk-item .name {
				display: inline-flex;
				align-items: center;
				gap: 8px;
			}
			.sk-item .name .tech-ico {
				width: 14px;
				height: 14px;
				margin-right: 0;
			}

			/* reveal on scroll */
			.reveal {
				opacity: 0;
				transform: translateY(24px);
				transition:
					opacity 0.8s ease,
					transform 0.8s ease;
			}
			.reveal.in {
				opacity: 1;
				transform: none;
			}
		</style>
	</head>

			const { useState, useEffect, useRef } = React;

			function useReveal() {
				const ref = useRef(null);
				useEffect(() => {
					const el = ref.current;
					if (!el) return;
					const io = new IntersectionObserver(
						(entries) => {
							entries.forEach((e) => {
								if (e.isIntersecting) {
									e.target.classList.add("in");
									io.unobserve(e.target);
								}
							});
						},
						{ threshold: 0.1 },
					);
					io.observe(el);
					return () => io.disconnect();
				}, []);
				return ref;
			}

			function useClock() {
				const [t, setT] = useState(() => new Date());
				useEffect(() => {
					const i = setInterval(() => setT(new Date()), 1000 * 30);

				}, []);
				const opts = {
					hour: "2-digit",
					minute: "2-digit",
					hour12: false,
					timeZone: "Asia/Kolkata",
				};
				return new Intl.DateTimeFormat("en-GB", opts).format(t);
			}

			function App() {
				const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

				useEffect(() => {
					document.documentElement.setAttribute(
						"data-theme",
						t.theme,
					);
					document.body.setAttribute("data-density", t.density);
					document.body.setAttribute("data-font", t.font);
					const a = ACCENTS[t.accent] || ACCENTS.lime;
					document.documentElement.style.setProperty(
						"--accent",
						t.theme === "light" ? a.light : a.dark,
					);
				}, [t.theme, t.accent, t.font, t.density]);

				useEffect(() => {
					const handler = (e) => {
						const a = e.target.closest("a[href^='#']");
						if (!a) return;
						const id = a.getAttribute("href");
						if (id.length < 2) return;
						const el = document.querySelector(id);
						if (!el) return;
						e.preventDefault();
						el.scrollIntoView({
							behavior: "smooth",
							block: "start",
						});
					};
					document.addEventListener("click", handler);
					return () => document.removeEventListener("click", handler);
				}, []);

				const toggleTheme = () =>
					setTweak("theme", t.theme === "dark" ? "light" : "dark");

				return (
					<>
						<Nav theme={t.theme} onTheme={toggleTheme} />

								onChange={(v) => setTweak("theme", v)}
							/>

								value={t.accent}
								onChange={(v) => setTweak("accent", v)}
							/>
							<TweakSection label="Typography" />
							<TweakSelect
								label="Font pairing"
								value={t.font}
								options={[

										value: "classic",
										label: "Classic · Cormorant",
									},
									{
										value: "mono",
										label: "Coded · Fragment Mono",
									},
								]}
								onChange={(v) => setTweak("font", v)}
							/>
							<TweakSection label="Layout" />
							<TweakRadio
								label="Density"
								value={t.density}
								options={["compact", "regular", "comfy"]}
								onChange={(v) => setTweak("density", v)}
							/>
						</TweaksPanel>
					</>
				);
			}

			ReactDOM.createRoot(document.getElementById("root")).render(
				<App />,
			);
		</script>
	</body>
</html>
